<!-- Buscador y Filtros HUDN (Reutilizable) -->
<div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 mb-8 animate-in fade-in slide-in-from-top-4 duration-500">
    <form method="get" id="filterForm" class="flex flex-wrap gap-4 items-end">
        <!-- Buscador -->
        <div class="relative flex-1 min-w-[300px]">
            <label class="block text-xs font-black text-blue-800 mb-1 uppercase tracking-wider">Buscar registros</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" name="q" value="{{ query|default:'' }}" placeholder="Palabra clave..." 
                    class="block w-full pl-10 pr-3 py-2.5 border-2 border-blue-100 rounded-xl text-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold">
            </div>
        </div>

        <!-- Selector Inteligente HUDN -->
        <div class="w-48">
            <label class="block text-xs font-black text-blue-800 mb-1 uppercase tracking-wider">Ver registros</label>
            <select id="limitOrderSelect" class="w-full p-2.5 border-2 border-blue-100 rounded-xl text-sm bg-white focus:border-blue-500 transition-all font-bold">
                <option value="limit=&order=asc" {% if not current_limit and current_order == 'asc' %}selected{% endif %}>Todos (Paginado)</option>
                <option value="limit=1&order=asc" {% if current_limit == '1' and current_order == 'asc' %}selected{% endif %}>El Primero</option>
                <option value="limit=1&order=desc" {% if current_limit == '1' and current_order == 'desc' %}selected{% endif %}>El Último</option>
                <option value="limit=5&order=asc" {% if current_limit == '5' and current_order == 'asc' %}selected{% endif %}>Los 5 Primeros</option>
                <option value="limit=5&order=desc" {% if current_limit == '5' and current_order == 'desc' %}selected{% endif %}>Los 5 Últimos</option>
                <option value="limit=10&order=asc" {% if current_limit == '10' and current_order == 'asc' %}selected{% endif %}>Los 10 Primeros</option>
                <option value="limit=10&order=desc" {% if current_limit == '10' and current_order == 'desc' %}selected{% endif %}>Los 10 Últimos</option>
            </select>
            <input type="hidden" name="limit" id="limitInput" value="{{ current_limit|default:'' }}">
            <input type="hidden" name="order" id="orderInput" value="{{ current_order|default:'asc' }}">
        </div>

        <div class="flex gap-2">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-black shadow-lg shadow-blue-500/30 transition-all flex items-center gap-2 uppercase text-xs">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                BUSCAR
            </button>
            
            {% if query or current_limit %}
            <a href="." class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2.5 rounded-xl font-bold transition-all text-xs flex items-center uppercase text-center justify-center">
                Limpiar
            </a>
            {% endif %}
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const select = document.getElementById('limitOrderSelect');
        if (select) {
            select.addEventListener('change', function() {
                const parts = this.value.split('&');
                const limit = parts[0].split('=')[1];
                const order = parts[1].split('=')[1];
                
                document.getElementById('limitInput').value = limit;
                document.getElementById('orderInput').value = order;
            });
        }
    });
</script>
