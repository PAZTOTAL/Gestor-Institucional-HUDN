<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Acceso — Paz y Salvo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-lg p-10 max-w-md w-full text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mb-5">
      <svg class="w-8 h-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0-10v4m0 0a2 2 0 110 4 2 2 0 010-4zm6.364-3.636A9 9 0 113.636 17.364 9 9 0 0118.364 5.636z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-slate-800 mb-2">Sin acceso</h1>
    <p class="text-slate-500 text-sm mb-6">
      El usuario <strong class="text-slate-700">{{ request.user.username }}</strong> no está autorizado
      para el módulo de Paz y Salvo.<br>Contacta al administrador del sistema.
    </p>
    <a href="{% url 'home' %}" class="inline-block bg-sky-600 hover:bg-sky-700 text-white font-semibold px-6 py-2 rounded-lg transition text-sm">
      Volver al inicio
    </a>
  </div>
</body>
</html>
