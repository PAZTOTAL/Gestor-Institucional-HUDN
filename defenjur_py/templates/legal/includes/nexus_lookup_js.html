<script>
/**
 * Script compartido para búsqueda de terceros en NEXUS por Cédula.
 * Replicado de tutela_form.html para consistencia institucional.
 */
document.addEventListener('DOMContentLoaded', function() {
    function buscarEnNexus(cedulaField, nombreField, colorBg) {
        var cedula = cedulaField.value.trim();
        if (!cedula || cedula.length <= 3) return;
        
        cedulaField.style.border = "2px solid #6366f1";
        fetch('{% url "buscar_tercero_nexus" %}?cedula=' + cedula)
            .then(function(response) { return response.json(); })
            .then(function(data) {
                cedulaField.style.border = "";
                if (data.success) {
                    nombreField.value = data.nombre;
                    nombreField.style.backgroundColor = colorBg;
                    nombreField.style.fontWeight = "bold";
                    setTimeout(function() { nombreField.style.backgroundColor = ""; }, 2000);
                }
            })
            .catch(function(error) {
                cedulaField.style.border = "2px solid #f43f5e";
                console.error('Error lookup Nexus:', error);
            });
    }

    // Configuración genérica por pares de ID [Cedula, Nombre, Color]
    const lookups = [
        ['id_cedula_accionante', 'id_accionante', "rgba(16, 185, 129, 0.2)"], // Tutelas
        ['id_cedula_accionante', 'id_nombre_persona_solicitante', "rgba(16, 185, 129, 0.2)"], // Peticiones (Nombre mapped)
        ['id_cedula_abogado', 'id_abogado_responsable', "rgba(99, 102, 241, 0.2)"], // Común Abogado
        ['id_cc_demandante', 'id_demandante', "rgba(16, 185, 129, 0.2)"], // Procesos Judiciales
        ['id_cedula_solicitante', 'id_demandante', "rgba(16, 185, 129, 0.2)"], // Genérico
    ];

    lookups.forEach(pair => {
        const cField = document.getElementById(pair[0]);
        const nField = document.getElementById(pair[1]);
        if (cField && nField) {
            cField.addEventListener('blur', function() {
                buscarEnNexus(cField, nField, pair[2]);
            });
        }
    });
});
</script>
