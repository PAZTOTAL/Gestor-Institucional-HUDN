<div>
    <table style="width:100%; border-collapse:collapse;">
        <thead>
            <tr style="text-align:left; color:var(--text-muted); border-bottom:1px solid rgba(255,255,255,0.1);">
                <th style="padding:0.75rem;">Nombre Archivo</th>
                <th style="padding:0.75rem;">Fecha Cargue</th>
                <th style="padding:0.75rem;">Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for a in archivos %}
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                <td style="padding:0.75rem;">
                    <div style="font-weight:500; font-size:0.9rem;">{{ a.nombre_original }}</div>
                </td>
                <td style="padding:0.75rem; font-size:0.85rem; color:var(--text-muted);">
                    {{ a.fecha_carga|date:"d/m/Y H:i" }}
                </td>
                <td style="padding:0.75rem;">
                    <a href="{{ a.archivo.url }}" target="_blank" class="btn-premium" style="padding:0.3rem 0.8rem; font-size:0.8rem; text-decoration:none;">
                        <i data-lucide="download" style="width:14px; height:14px;"></i> Ver / Descargar
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" style="padding:2rem; text-align:center; color:var(--text-muted);">
                    No hay archivos adjuntos para este registro.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div style="margin-top:2rem;text-align:right;">
        <button type="button" class="btn-premium" style="background:rgba(255,255,255,0.1);" onclick="document.getElementById('premiumModal').close()">Cerrar</button>
    </div>
</div>
