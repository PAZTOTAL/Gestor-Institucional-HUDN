{% extends 'core/base.html' %}
{% load static %}

{% block title %}Nueva Alerta | Central de Mezclas{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-in slide-in-from-bottom-8 duration-700">
    <div class="bg-white rounded-3xl border border-gray-100 shadow-2xl overflow-hidden">
        <div class="bg-indigo-600 p-8 text-white">
            <h2 class="text-3xl font-black tracking-tight">Definición de Alerta</h2>
            <p class="text-indigo-100 font-medium">Asigne códigos y colores para la semaforización visual.</p>
        </div>
        <form method="post" class="p-8 space-y-8">
            {% csrf_token %}
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-wider">Código de Alerta (Ej: BAJO, ALTO, CRITICO)</label>
                    <input type="text" name="codigo" value="{{ form.codigo.value|default:'' }}" required class="w-full px-6 py-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-indigo-600 focus:bg-white transition-all font-bold text-gray-900">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-wider">Color (Hexadecimal o Nombre CSS)</label>
                    <div class="flex gap-4">
                        <input type="text" name="color" id="colorInput" value="{{ form.color.value|default:'' }}" required class="flex-grow px-6 py-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-indigo-600 focus:bg-white transition-all font-bold text-gray-900" placeholder="#ff0000 o Red">
                        <input type="color" id="colorPicker" value="{% if form.color.value|slice:'0:1' == '#' %}{{ form.color.value }}{% else %}#000000{% endif %}" class="w-16 h-16 p-1 rounded-xl bg-gray-50 border-2 border-gray-100 cursor-pointer">
                    </div>
                </div>
            </div>
            <div class="pt-8 border-t border-gray-50 flex justify-end gap-4">
                <a href="{% url 'mezclas:alerta_list' %}" class="px-8 py-4 rounded-2xl bg-gray-50 text-gray-400 font-black hover:bg-gray-100">Cancelar</a>
                <button type="submit" class="px-12 py-4 rounded-2xl bg-indigo-600 text-white font-black shadow-xl hover:scale-105 transition-all">Guardar Alerta</button>
            </div>
        </form>
    </div>
</div>

<script>
    const picker = document.getElementById('colorPicker');
    const input = document.getElementById('colorInput');
    picker.addEventListener('input', () => { input.value = picker.value; });
    input.addEventListener('input', () => { picker.value = input.value; });
</script>
{% endblock %}
