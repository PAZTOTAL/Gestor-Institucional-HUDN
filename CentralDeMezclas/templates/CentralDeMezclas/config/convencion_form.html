{% extends 'core/base.html' %}
{% load static %}

{% block title %}Nueva Convención | Central de Mezclas{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-in slide-in-from-bottom-8 duration-700">
    <div class="bg-white rounded-3xl border border-gray-100 shadow-2xl overflow-hidden">
        <div class="bg-primary p-8 text-white">
            <h2 class="text-3xl font-black tracking-tight">Registro de Convención</h2>
            <p class="text-white/80 font-medium">Defina formas farmacéuticas y sus vías oficiales.</p>
        </div>
        <form method="post" class="p-8 space-y-8">
            {% csrf_token %}
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-wider">Forma Farmacéutica</label>
                    <input type="text" name="forma_farmaceutica" value="{{ form.forma_farmaceutica.value|default:'' }}" required class="w-full px-6 py-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-primary focus:bg-white transition-all font-bold text-gray-900">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-wider">Vía de Administración</label>
                    <input type="text" name="via" value="{{ form.via.value|default:'' }}" required class="w-full px-6 py-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-primary focus:bg-white transition-all font-bold text-gray-900">
                </div>
            </div>
            <div class="pt-8 border-t border-gray-50 flex justify-end gap-4">
                <a href="{% url 'mezclas:convencion_list' %}" class="px-8 py-4 rounded-2xl bg-gray-50 text-gray-400 font-black hover:bg-gray-100">Cancelar</a>
                <button type="submit" class="px-12 py-4 rounded-2xl bg-primary text-white font-black shadow-xl hover:scale-105 transition-all">Guardar Convención</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
