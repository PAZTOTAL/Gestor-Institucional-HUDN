<div id="import-excel-section" style="display:none; margin-bottom:2rem; padding:1.5rem; background:rgba(99, 102, 241, 0.05); border:1px dashed var(--accent); border-radius:20px; animation: slideDown 0.4s ease-out;">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.5rem;">
        <div>
            <h3 style="margin:0; color:var(--text-main); font-size:1.1rem; display:flex; align-items:center; gap:8px;">
                <i data-lucide="upload-cloud" style="width:20px; color:var(--accent);"></i>
                Carga Masiva de Datos desde Excel
            </h3>
            <p style="margin:5px 0 0; color:var(--text-muted); font-size:0.85rem;">
                Utilice la plantilla oficial para asegurar la compatibilidad de los datos.
            </p>
        </div>
        <a href="{% url 'defenjur:descargar_plantilla' modulo %}" class="btn-premium" style="background:rgba(16, 185, 129, 0.1); color:#10b981; border-color:#10b981; text-decoration:none; font-size:0.8rem; padding:0.5rem 1rem;">
            <i data-lucide="download" style="width:14px;"></i> Descargar Plantilla
        </a>
    </div>

    <form hx-post="{% url 'defenjur:importar_excel' modulo %}" hx-encoding="multipart/form-data" hx-target="body" hx-push-url="false" style="display:flex; flex-direction:column; gap:1.25rem;">
        {% csrf_token %}
        <div style="background:rgba(255,255,255,0.03); border:2px dashed var(--glass-border); border-radius:15px; padding:2rem; text-align:center; transition:all 0.3s;" 
             onmouseover="this.style.borderColor='var(--accent)';" onmouseout="this.style.borderColor='var(--glass-border)';"
             onclick="this.querySelector('input').click()">
            <i data-lucide="file-spreadsheet" style="width:40px; height:40px; color:var(--text-muted); margin-bottom:1rem;"></i>
            <p id="file-name-display" style="margin:0; font-weight:600; color:var(--text-main);">Pulsa aquí para seleccionar un archivo .xlsx</p>
            <input type="file" name="archivo_excel" accept=".xlsx, .xls" required style="display:none;" 
                   onchange="document.getElementById('file-name-display').innerText = this.files[0].name; document.getElementById('file-name-display').style.color='var(--accent)';">
        </div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text-muted); font-size:0.9rem;">
                <input type="checkbox" name="preview" value="true" style="width:16px; height:16px; accent-color:var(--accent);">
                <span>Solo Vista Previa (Simulación de carga)</span>
            </label>
            <div style="display:flex; gap:0.75rem;">
                <button type="button" class="btn-premium" style="background:rgba(255,255,255,0.05);" onclick="document.getElementById('import-excel-section').style.display='none'">Cancelar</button>
                <button type="submit" class="btn-premium">
                    <i data-lucide="play" style="width:16px;"></i> Iniciar Importación
                </button>
            </div>
        </div>
    </form>
</div>

<style>
@keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
