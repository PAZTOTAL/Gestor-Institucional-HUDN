<!DOCTYPE html>
<html>

<head>
    <style>
        @page {
            size: letter;
            margin: 2cm;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #00b09b;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table th,
        .table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .table th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>INDICADORES DE SALUD</h1>
        <p>Hospital Management System</p>
    </div>

    <p>Periodo: {{ sd|date:"d/m/Y" }} - {{ ed|date:"d/m/Y" }}</p>

    <table class="table">
        <tr>
            <th>Concepto</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>Pacientes Atendidos</td>
            <td>{{ total_pacientes }}</td>
        </tr>
    </table>

    <p><small>* Información procesada desde la base de datos asistencial.</small></p>
</body>

</html>
